name: Anchor CI

on:
  push:
    branches:
      - main
      - next-release

  pull_request:
    branches:
      - main
      - next-release

  workflow_dispatch:
    inputs:
      test_suite:
        description: "Select which suite to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - build-only
          - rust
          - typescript

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: . -> target

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install latest
          avm use latest

      - name: Install Node dependencies
        run: yarn install

      - name: Stage program deploy keypairs
        run: yarn prep:program-keys

      - name: Set Solana cluster to devnet
        run: solana config set --url devnet

      - name: Create CI provider wallet
        run: solana-keygen new --no-bip39-passphrase --force --outfile keys/devnet-admin.json

  build:
    name: Build Anchor Programs
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'build-only'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Build Anchor programs
        run: anchor build

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'rust'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Rust tests
        run: cargo test --workspace --features litesvm-integration -- --nocapture

  typescript-tests:
    name: TypeScript Lifecycle Tests
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'typescript'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run TypeScript lifecycle tests
        run: yarn test:lifecycle

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
      - rust-tests
      - typescript-tests
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Anchor CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Setup completed" >> $GITHUB_STEP_SUMMARY
          echo "- Build job evaluated" >> $GITHUB_STEP_SUMMARY
          echo "- Rust tests evaluated" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript tests evaluated" >> $GITHUB_STEP_SUMMARY