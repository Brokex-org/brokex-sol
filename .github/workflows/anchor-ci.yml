name: Anchor CI

on:
  push:
    branches:
      - main
      - next-release

  pull_request:
    branches:
      - main
      - next-release

  workflow_dispatch:
    inputs:
      test_suite:
        description: "Select which suite to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - build-only
          - rust
          - typescript

# One runner installs the toolchain and runs build + tests in order. Split jobs do not
# share PATH, caches of binaries, or target/deploy/*.so, which caused "anchor: command
# not found", missing cargo build-sbf, and LiteSVM tests failing without brokex_core.so.

env:
  ANCHOR_VERSION: "1.0.1"

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: . -> target

      - name: Install Solana CLI (provides cargo build-sbf)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI via AVM
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"
          avm install "$ANCHOR_VERSION"
          avm use "$ANCHOR_VERSION"
          anchor --version
          solana --version

      - name: Install Node dependencies
        run: yarn install

      - name: Stage program deploy keypairs
        run: yarn prep:program-keys

      - name: Create wallet for Anchor config
        run: |
          mkdir -p keys
          solana-keygen new --no-bip39-passphrase --force --outfile keys/devnet-admin.json

      - name: Anchor build
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'build-only' || github.event.inputs.test_suite == 'rust' }}
        run: anchor build

      - name: Rust tests (LiteSVM — needs fresh target/deploy/*.so)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'rust' }}
        run: |
          # anchor build updates deploy/*.so; refresh with current sources (core needs mock-oracle for merged-oracle tests).
          cargo build-sbf --manifest-path programs/brokex-core/Cargo.toml --features mock-oracle --sbf-out-dir target/deploy
          cargo build-sbf --manifest-path programs/brokex-vault/Cargo.toml --sbf-out-dir target/deploy
          cargo test --workspace --features litesvm-integration,mock-oracle -- --nocapture

      - name: TypeScript lifecycle tests
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'typescript' }}
        run: yarn test:lifecycle

      - name: CI summary
        if: always()
        run: |
          echo "## Anchor CI" >> "$GITHUB_STEP_SUMMARY"
          echo "- Anchor ${ANCHOR_VERSION}, Solana and AVM on PATH for this job" >> "$GITHUB_STEP_SUMMARY"
          echo "- LiteSVM tests run after \`anchor build\` + \`cargo build-sbf --sbf-out-dir target/deploy\` (core with \`mock-oracle\`)" >> "$GITHUB_STEP_SUMMARY"
