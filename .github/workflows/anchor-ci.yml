name: Anchor CI

on:
  push:
    branches:
      - main
      - next-release
      - "feat/**"

  pull_request:
    branches:
      - main
      - next-release

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: . -> target

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM
        env:
          # Use git CLI for HTTPS fetches (more reliable in CI than Cargo's libgit2).
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install latest
          avm use latest

      - name: Install Node dependencies
        run: yarn install

      # Committed program keypairs must match declare_id! (do not commit `target/`).
      - name: Stage program deploy keypairs
        run: |
          mkdir -p target/deploy
          cp deploy/brokex_core-keypair.json deploy/brokex_vault-keypair.json target/deploy/

      - name: Set Solana cluster to devnet
        run: solana config set --url devnet

      - name: Build Anchor programs (production)
        run: anchor build

      # Rust unit + LiteSVM integration tests run against the production build
      - name: Run Rust tests
        run: cargo test --workspace --features litesvm-integration -- --nocapture

      # Rebuild with mock-oracle feature for TypeScript lifecycle tests.
      # mock-oracle allows system-owned accounts to act as price feeds in localnet tests.
      # The feature is ONLY active here; the production binary above is unaffected.
      - name: Build Anchor programs (mock-oracle for TS tests)
        run: anchor build -- --features mock-oracle

      - name: Run TypeScript lifecycle tests
        run: anchor test --skip-build --validator legacy
