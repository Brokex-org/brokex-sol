name: Anchor CI

on:
  push:
    branches:
      - main
      - next-release
      - "feat/**"

  pull_request:
    branches:
      - main
      - next-release

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM
        env:
          # Use git CLI for HTTPS fetches (more reliable in CI than Cargo's libgit2).
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install latest
          avm use latest

      - name: Install Node dependencies
        run: yarn install

      - name: Generate keypair for CI
        run: solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json

      - name: Set Solana cluster to localnet
        run: solana config set --url localhost

      # CI has no committed program keypair; cache may restore a different key than declare_id!.
      - name: Build Anchor programs
        run: anchor build --ignore-keys

      # Rust unit integration tests
      - name: Run Rust tests
        run: cargo test --package brokex-solana -- --nocapture

      # TypeScript integration tests via ts-mocha against local validator
      # anchor test handles: start validator → deploy → run [scripts.test] → stop validator
      - name: Run TypeScript tests
        run: anchor test --skip-build --validator legacy
