[toolchain]
anchor_version = "1.0.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
brokex-core = "9bPWLjPxqR78kR63YokXeQ8k1nLDHfagh4W2117vjyWu"
brokex-vault = "4fgPnwcAxYT3QAutMSLPMNczp4fPugTZYotdmZGsy6sR"

[programs.localnet]
brokex-vault = "4fgPnwcAxYT3QAutMSLPMNczp4fPugTZYotdmZGsy6sR"
brokex-core = "9bPWLjPxqR78kR63YokXeQ8k1nLDHfagh4W2117vjyWu"

[provider]
cluster = "localnet"
wallet = "keys/localnet-authority.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Default `anchor test` uses Surfpool; if simulations fail with
# "This program may not be used for executing instructions", run:
#   anchor test --validator legacy
# or: yarn test:anchor

[hooks]

[test]
startup_wait = 20000
shutdown_wait = 2000
upgradeable = false
