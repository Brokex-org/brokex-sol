[toolchain]
anchor_version = "1.0.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
brokex-core = "2D2SpgCJqZquV5DD1jrXWL6cmuqoxFgsNjihkt9BUdNB"
brokex-vault = "6bo6uqoj77cHBMYg9FCbKYGc3iUzNW62RLK7Xmzqawk8"

[programs.localnet]
brokex-core = "2D2SpgCJqZquV5DD1jrXWL6cmuqoxFgsNjihkt9BUdNB"
brokex-vault = "6bo6uqoj77cHBMYg9FCbKYGc3iUzNW62RLK7Xmzqawk8"

[provider]
cluster = "localnet"
wallet = "keys/devnet-admin.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/brokex-core-lifecycle.ts"

# Default `anchor test` uses Surfpool; if simulations fail with
# "This program may not be used for executing instructions", run:
#   anchor test --validator legacy
# or: yarn test:anchor

[hooks]

[test]
startup_wait = 20000
shutdown_wait = 2000
upgradeable = false
