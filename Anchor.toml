[toolchain]
anchor_version = "1.0.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
brokex-core = "7yRpue4276YpzxgF3bTTUfTTUbtVArjDYbbYxYBWV8Ys"
brokex-vault = "AePFV3TeyAkWMSR3YjE7ufkkwo1Mcsm4vUDSgvouqxUK"

[programs.localnet]
brokex-vault = "AePFV3TeyAkWMSR3YjE7ufkkwo1Mcsm4vUDSgvouqxUK"
brokex-core = "7yRpue4276YpzxgF3bTTUfTTUbtVArjDYbbYxYBWV8Ys"

[provider]
cluster = "localnet"
wallet = "keys/localnet-authority.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/brokex-core-lifecycle.ts"

# Default `anchor test` uses Surfpool; if simulations fail with
# "This program may not be used for executing instructions", run:
#   anchor test --validator legacy
# or: yarn test:anchor

[hooks]

[test]
startup_wait = 20000
shutdown_wait = 2000
upgradeable = false
